name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tooling
        run: brew install chezmoi shellcheck

      - name: Bash syntax checks
        run: |
          find scripts -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
          mkdir -p "${RUNNER_TEMP}/rendered-chezmoi"
          while IFS= read -r -d '' template; do
            rendered="${RUNNER_TEMP}/rendered-chezmoi/$(basename "${template%.tmpl}")"
            chezmoi execute-template --source "${GITHUB_WORKSPACE}" --file "${template}" > "${rendered}"
            bash -n "${rendered}"
          done < <(find .chezmoiscripts -type f -name '*.sh.tmpl' -print0)

      - name: Shellcheck
        run: |
          find scripts -type f -name '*.sh' -print0 | xargs -0 -n1 shellcheck
          while IFS= read -r -d '' rendered; do
            shellcheck -e SC1091,SC2050 "${rendered}"
          done < <(find "${RUNNER_TEMP}/rendered-chezmoi" -type f -name '*.sh' -print0)

      - name: Chezmoi dry run
        run: |
          mkdir -p "${RUNNER_TEMP}/chezmoi-home"
          chezmoi apply --source "${GITHUB_WORKSPACE}" --destination "${RUNNER_TEMP}/chezmoi-home" --dry-run

      - name: Privacy verification (history strict)
        run: bash scripts/verify-privacy.sh --source-dir "${GITHUB_WORKSPACE}" --history --strict
